<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#112038">
<title>Elbow Room — Event Hour Sign-Up</title>
<link rel="icon" href="../images/elbowroom/favicon-32.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&amp;family=Fraunces:opsz,wght@9..144,500;9..144,600&amp;family=Inter:wght@500;600;700&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1b2c4d;--navy-deep:#112038;--gold:#c49a48;--gold-light:#dcc06a;
    --gold-deep:#8a6a2e;--green:#3c6a4d;--cream:#f6f3ec;--paper:#fbf9f4;
    --ink:#16203a;--muted:#5b6473;--line:rgba(27,44,77,.27);
    --wordmark:'Cinzel',Georgia,serif;--display:'Fraunces',Georgia,serif;
    --body:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  body{background:#e7e3da;color:var(--ink);font-family:var(--body);padding:26px 18px 60px}
  .guide{max-width:8.5in;margin:0 auto 26px;background:var(--paper);border:1px solid rgba(27,44,77,.14);border-radius:14px;padding:20px 24px;box-shadow:0 10px 30px rgba(17,32,56,.08);display:flex;align-items:center;justify-content:space-between;gap:20px}
  .guide h1{font-family:var(--display);font-weight:600;font-size:24px;color:var(--navy);margin-bottom:5px}
  .guide p{font-size:14px;line-height:1.55;color:var(--muted)}
  .guide button{border:0;border-radius:999px;background:var(--navy);color:#fff;font:700 14px var(--body);padding:12px 18px;cursor:pointer;white-space:nowrap}
  .guide button:hover{background:#243a63}
  .guide button:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
  .pages{display:flex;flex-direction:column;align-items:center;gap:28px}
  .sheet{width:8.5in;height:11in;background:var(--paper);box-shadow:0 14px 40px rgba(17,32,56,.2);padding:.24in .32in .2in;display:grid;grid-template-rows:auto auto auto auto minmax(0,1fr) auto;overflow:hidden;position:relative}
  .sheet::after{content:"";position:absolute;right:-.8in;top:-.8in;width:2.5in;height:2.5in;border:1pt solid rgba(196,154,72,.15);border-radius:50%;pointer-events:none}
  .head{display:grid;grid-template-columns:1.7in 1fr .72in;align-items:center;gap:.18in;padding-bottom:.11in;border-bottom:1pt solid rgba(196,154,72,.45);position:relative;z-index:1}
  .brand{display:flex;align-items:center;gap:.09in}
  .brand img{width:.58in;height:.58in;object-fit:contain}
  .brand-name{font-family:var(--wordmark);font-size:14pt;font-weight:700;line-height:1;color:var(--navy);letter-spacing:.08em}
  .brand-name span{display:block;color:var(--gold-deep)}
  .brand-sub{font-size:6.5pt;line-height:1.2;letter-spacing:.22em;text-transform:uppercase;color:var(--green);margin-top:4pt}
  .title{text-align:center}
  .title h2{font-family:var(--display);font-size:20pt;font-weight:600;line-height:1;color:var(--navy)}
  .title p{margin-top:5pt;font-size:9pt;line-height:1.25;color:var(--muted)}
  .qr{text-align:center;font-size:6.5pt;font-weight:700;line-height:1.1;color:var(--navy);text-transform:uppercase;letter-spacing:.05em}
  .qr img{display:block;width:.58in;height:.58in;margin:0 auto 3pt;padding:3pt;background:#fff;border:1pt solid rgba(27,44,77,.14);border-radius:5pt}
  .deal{margin-top:.08in;display:grid;grid-template-columns:1fr 1.92in;border:1pt solid rgba(196,154,72,.65);border-radius:6pt;overflow:hidden;position:relative;z-index:1}
  .deal-main{min-height:.55in;background:var(--navy-deep);color:var(--cream);display:flex;align-items:center;gap:.13in;padding:.06in .13in}
  .deal-price{font-family:var(--display);font-size:27pt;font-weight:600;line-height:.9;color:var(--gold-light);white-space:nowrap}
  .deal-copy strong{display:block;font-size:9.5pt;line-height:1.1;letter-spacing:.045em}
  .deal-copy span{display:block;margin-top:3pt;font-size:6.8pt;line-height:1.2;color:#e5e7eb}
  .deal-alt{background:#efe9dd;color:var(--navy);display:flex;flex-direction:column;justify-content:center;padding:.055in .11in;border-left:1pt solid rgba(196,154,72,.4)}
  .deal-alt span{font-size:6.5pt;font-weight:700;line-height:1;text-transform:uppercase;letter-spacing:.13em;color:var(--gold-deep)}
  .deal-alt strong{margin-top:3pt;font-family:var(--display);font-size:14pt;line-height:1;color:var(--navy)}
  .deal-alt small{margin-top:3pt;font-size:6.5pt;line-height:1.15;color:var(--muted)}
  .daybar{margin-top:.11in;background:var(--navy-deep);color:var(--cream);border-radius:6pt;padding:.09in .13in;display:flex;align-items:baseline;justify-content:space-between;gap:.18in}
  .daybar h3{font-family:var(--wordmark);font-size:13pt;line-height:1;letter-spacing:.07em;color:var(--gold-light)}
  .daybar p{font-size:8.5pt;line-height:1.2;text-align:right;color:#eef2f8}
  .daybar b{color:var(--gold-light)}
  .column-head{display:grid;grid-template-columns:.78in 1fr 1.55in 2.04in;gap:.08in;padding:.07in .08in .04in;font-size:7.2pt;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-deep)}
  .slots{min-height:0;display:flex;flex-direction:column;border-top:1pt solid var(--line)}
  .slot{flex:1;min-height:.19in;max-height:.29in;display:grid;grid-template-columns:.78in 1fr 1.55in 2.04in;gap:.08in;align-items:end;padding:0 .08in .03in;border-bottom:.7pt dotted rgba(27,44,77,.34);font-size:10.5pt;line-height:1}
  .time{font-weight:700;color:var(--navy)}
  .write{height:.13in;border-bottom:.65pt solid rgba(27,44,77,.55)}
  .offer-choice{align-self:center;font-size:7.3pt;font-weight:700;line-height:1;letter-spacing:.015em;color:var(--navy);white-space:nowrap}
  .offer-choice .secondary{color:var(--muted);font-weight:600}
  .foot{padding-top:.07in;display:grid;grid-template-columns:1fr auto;align-items:end;gap:.16in;font-size:6.8pt;line-height:1.26;color:var(--muted)}
  .foot strong{color:var(--navy)}
  .foot .contact{text-align:right;white-space:nowrap;font-size:8pt;color:var(--navy)}
  .foot .contact b{display:block;font-family:var(--wordmark);letter-spacing:.06em;color:var(--gold-deep)}
  @media(max-width:850px){
    body{padding:14px 8px 36px}.guide{align-items:flex-start;flex-direction:column}.guide button{width:100%}
    .pages{align-items:flex-start;overflow-x:auto;padding-bottom:12px}.sheet{transform-origin:top left}
  }
  @page{size:letter portrait;margin:0}
  @media print{
    body{background:#fff;padding:0}.guide{display:none}.pages{display:block}.sheet{height:10.5in;box-shadow:none;margin:0;break-inside:avoid;page-break-inside:avoid;break-after:auto;page-break-after:auto}
  }
</style>
</head>
<body>
  <section class="guide" aria-label="Print instructions">
    <div>
      <h1>Elbow Room Event Hour sign-up sheets</h1>
      <p>Five Event Hour clipboard pages · $40 full hour first, free 15-minute option second.<br>Print with background graphics enabled.</p>
    </div>
    <button type="button" id="print-sheets">Print all five pages</button>
  </section>

  <main class="pages" id="pages"></main>

<script>
  (() => {
    const schedule = [
      {
        day: 'SUNDAY', date: 'JULY 19',
        availability: 'Available 9:00 AM–1:30 PM · after 3:30 PM',
        starts: [[540, 780], [930, 1050]]
      },
      {
        day: 'SUNDAY', date: 'JULY 26',
        availability: 'Available all day · last promo start 5:30 PM',
        starts: [[540, 1050]]
      },
      {
        day: 'SATURDAY', date: 'AUGUST 1',
        availability: '9 AM–noon · 12:30–3 PM · 4:05–6 PM',
        starts: [[540, 690], [750, 870], [975, 1050]]
      },
      {
        day: 'SUNDAY', date: 'AUGUST 2',
        availability: 'Available all day · last promo start 5:30 PM',
        starts: [[540, 1050]]
      },
      {
        day: 'SATURDAY', date: 'AUGUST 8',
        availability: 'Available all day · last promo start 5:30 PM',
        starts: [[540, 1050]]
      }
    ];

    const el = (tag, className, text) => {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    };
    const quarterHours = (start, end) => {
      const result = [];
      for (let minute = start; minute <= end; minute += 15) result.push(minute);
      return result;
    };
    const formatTime = (minute) => {
      const hour24 = Math.floor(minute / 60);
      const hour12 = hour24 % 12 || 12;
      const minutes = String(minute % 60).padStart(2, '0');
      return `${hour12}:${minutes} ${hour24 < 12 ? 'AM' : 'PM'}`;
    };

    const pages = document.getElementById('pages');
    schedule.forEach((entry) => {
      const sheet = el('section', 'sheet');
      sheet.setAttribute('aria-label', `${entry.day}, ${entry.date} signup sheet`);

      const head = el('header', 'head');
      const brand = el('div', 'brand');
      const mark = el('img');
      mark.src = '../images/elbowroom/mark-400.png';
      mark.alt = 'Elbow Room emblem';
      const brandCopy = el('div');
      const brandName = el('div', 'brand-name');
      brandName.append(el('span', '', 'ELBOW'), document.createTextNode(' ROOM'));
      brandCopy.append(brandName, el('div', 'brand-sub', 'Massage Therapy'));
      brand.append(mark, brandCopy);

      const title = el('div', 'title');
      title.append(
        el('h2', '', 'THE EVENT HOUR SIGN-UP'),
        el('p', '', 'Choose your offer and appointment time · Alex Adamczyk, LMT')
      );

      const qr = el('div', 'qr');
      const qrImage = el('img');
      qrImage.src = '../images/elbowroom/qr-book.png';
      qrImage.alt = 'Scan to book at elbowroommassage.com/book';
      qr.append(qrImage, document.createTextNode('Offer details'));
      head.append(brand, title, qr);

      const deal = el('section', 'deal');
      deal.setAttribute('aria-label', 'Event Hour special: first full hour for $40, with a free 15-minute option');
      const dealMain = el('div', 'deal-main');
      const dealCopy = el('div', 'deal-copy');
      dealCopy.append(
        el('strong', '', 'BOOK YOUR FIRST FULL HOUR AT THE TABLE TODAY'),
        el('span', '', 'Normally $85 · first 10 bookings · code ENDLESS40 · appointment within 30 days')
      );
      dealMain.append(el('div', 'deal-price', '$40'), dealCopy);
      const dealAlt = el('div', 'deal-alt');
      dealAlt.append(el('span', '', 'Other option'), el('strong', '', 'FREE 15 MINUTES'), el('small', '', 'New-client first visit'));
      deal.append(dealMain, dealAlt);

      const daybar = el('div', 'daybar');
      daybar.append(el('h3', '', `${entry.day} · ${entry.date}`), el('p', '', entry.availability));

      const columnHead = el('div', 'column-head');
      columnHead.append(el('span', '', 'Start'), el('span', '', 'Name'), el('span', '', 'Phone'), el('span', '', 'Choose offer'));

      const slots = el('div', 'slots');
      entry.starts.flatMap(([start, end]) => quarterHours(start, end)).forEach((minute) => {
        const slot = el('div', 'slot');
        const offerChoice = el('span', 'offer-choice');
        offerChoice.append(document.createTextNode('□ $40 HOUR   '), el('span', 'secondary', '□ FREE 15'));
        slot.append(el('span', 'time', formatTime(minute)), el('span', 'write'), el('span', 'write'), offerChoice);
        slots.append(slot);
      });

      const foot = el('footer', 'foot');
      const disclaimer = el('p');
      const strong = el('strong', '', 'Offer + wellness terms: ');
      disclaimer.append(
        strong,
        document.createTextNode('For a $40 hour, block four consecutive rows. Event Hour applies to a first 60-minute Elbow Room session; new clients or chair clients who have never booked an hour; first 10; one per person; book within 30 days; 24-hour cancellation. Free 15-minute first visit available instead. The $40 hour preserves your new-client credit for next visit. Massage is for general wellness, not diagnosis or treatment. Alex Adamczyk, LMT · GA #MT013193.')
      );
      const contact = el('div', 'contact');
      contact.append(el('b', '', 'ELBOW ROOM'), document.createTextNode('elbowroommassage.com/book'), el('br'), document.createTextNode('@elbowroommassage'));
      foot.append(disclaimer, contact);

      sheet.append(head, deal, daybar, columnHead, slots, foot);
      pages.append(sheet);
    });

    document.getElementById('print-sheets').addEventListener('click', () => window.print());
  })();
</script>
</body>
</html>
