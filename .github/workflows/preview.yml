name: PR preview

# Deploys every pull request to a Cloudflare Workers preview alias so each PR
# gets a live URL (pr-<number>.elbowroom-preview.workers.dev) for review before
# merge. Uses the same assets-only upload path as production (wrangler.jsonc),
# just to the preview worker name instead of the production one.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Same parse gate as gate.yml, inlined so a broken PR never gets a
      # green-looking preview URL.
      - name: JS parses (node --check)
        run: |
          files=$(git ls-files '*.js' '*.mjs' '*.cjs' | grep -vE '\.min\.js$|/vendor/|_deprecated/' || true)
          if [ -z "$files" ]; then echo "no js"; exit 0; fi
          for f in $files; do
            node --check "$f" || { echo "::error file=$f::JS syntax error"; exit 1; }
          done

      - name: CSS parses (stylelint)
        run: |
          files=$(git ls-files '*.css' | grep -vE '\.min\.css$|/vendor/|_deprecated/' || true)
          if [ -z "$files" ]; then echo "no css"; exit 0; fi
          npx --yes stylelint $files

      - name: HTML structure (html-validate)
        run: |
          files=$(git ls-files '*.html' | grep -vE '/vendor/|_deprecated/' || true)
          if [ -z "$files" ]; then echo "no html"; exit 0; fi
          npx --yes html-validate $files

      # Assets-only deploy to the preview worker. --preview-alias makes
      # pr-<number> a stable alias that always points at this PR's latest
      # version upload, so the same URL updates on every push to the PR.
      - name: Deploy preview (wrangler versions upload)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 versions upload \
            --name elbowroom-preview \
            --assets ./ \
            --preview-alias "pr-${{ github.event.pull_request.number }}" \
            --message "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://pr-${{ github.event.pull_request.number }}.elbowroom-preview.workers.dev`;
            const marker = '<!-- pr-preview -->';
            const body = `${marker}\n### PR preview\n${url}\n\nDeployed from commit ${context.sha.slice(0, 7)}. Updates automatically on every push to this PR.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ github.event.pull_request.number }},
                body,
              });
            }
